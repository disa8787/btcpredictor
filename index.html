<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BTC Predictor Pro</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    
    <link rel="stylesheet" href="styles.css?v=200">
</head>
<body>
    <div id="app">
        <header class="top-header">
            <div class="stat-block">
                <span class="label">MY BALANCE</span>
                <span id="balance-amount" class="value balance-text">Loading...</span>
            </div>
            <div class="stat-block right-align">
                <span class="label">BTC/USDT</span>
                <span id="live-price" class="value price-text">Connecting...</span>
            </div>
        </header>

        <div id="chart-container">
            <div id="chart-loader" class="loader">Loading Chart...</div>
        </div>

        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>

        <div class="controls">
            <button class="bet-btn up-btn" onclick="placeBet('up')">
                UP
                <span class="payout">Payout x1.95</span>
            </button>
            <button class="bet-btn down-btn" onclick="placeBet('down')">
                DOWN
                <span class="payout">Payout x1.95</span>
            </button>
        </div>

        <div class="history-section">
            <h4 class="history-title">RECENT POSITIONS</h4>
            <div id="history-list">
                <div id="empty-history">No active trades</div>
            </div>
        </div>
    </div>

    <script src="app.js?v=200"></script>
</body>
</html>
