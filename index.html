<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BTC Predictor Live</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --up: #00c853; --down: #ff3d00; --bg: #131722; --card: #1e222d; --text: #d1d4dc; --hint: #848e9c; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); overflow: hidden; padding: 15px; }
        #debug-log { color: #ff5252; font-size: 11px; margin-bottom: 5px; word-wrap: break-word; font-family: monospace; }
        header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .label { font-size: 10px; color: var(--hint); margin-bottom: 4px; display: block; }
        .val { font-size: 20px; font-weight: bold; }
        #balance { color: #f0b90b; }
        #chart-wrap { position: relative; height: 260px; background: var(--card); border-radius: 12px; margin-bottom: 15px; }
        #chart { width: 100%; height: 100%; }
        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--hint); }
        .timer-bar { height: 6px; background: var(--card); border-radius: 3px; margin-bottom: 20px; }
        #progress { height: 100%; width: 100%; background: #2962ff; transition: 1s linear; }
        .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        button { border: none; border-radius: 12px; padding: 15px; color: white; font-size: 16px; font-weight: bold; opacity: 0.5; transition: 0.2s; }
        button:not([disabled]) { opacity: 1; cursor: pointer; }
        button:not([disabled]):active { transform: scale(0.95); }
        #btn-up { background: var(--up); }
        #btn-down { background: var(--down); }
        .pos-title { font-size: 12px; color: var(--hint); margin-bottom: 10px; text-transform: uppercase; }
        #positions { overflow-y: auto; max-height: 150px; }
        .card { background: var(--card); padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="debug-log"></div>
    
    <header>
        <div><span class="label">WALLET</span><span id="balance" class="val">$1,000.00</span></div>
        <div style="text-align:right;"><span class="label">BTC/USD</span><span id="price" class="val">Wait...</span></div>
    </header>
    
    <div id="chart-wrap">
        <div id="chart"></div>
        <div id="loader">Connecting to Market...</div>
    </div>
    
    <div>
        <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:5px;">
            <span>Round resolves in: <strong id="timer">05:00</strong></span>
        </div>
        <div class="timer-bar"><div id="progress"></div></div>
    </div>
    
    <div class="btns">
        <button id="btn-up" disabled>UP (x1.95)</button>
        <button id="btn-down" disabled>DOWN (x1.95)</button>
    </div>
    
    <div>
        <div class="pos-title">My Positions</div>
        <div id="positions"><div style="color:var(--hint); font-size:12px; text-align:center;">No active positions</div></div>
    </div>
