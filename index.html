<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BTC Live Trading</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <link rel="stylesheet" href="styles.css?v=99">
</head>
<body>
    <div id="app">
        <header class="top-bar">
            <div class="wallet">
                <span class="label">WALLET</span>
                <span id="balance-amount">$1,000.00</span>
            </div>
            <div class="price-container">
                <span class="label">BTC/USDT</span>
                <span id="live-price">Connecting...</span>
            </div>
        </header>

        <div id="tv-chart"></div>

        <div class="controls">
            <div class="round-timer">
                <div class="progress-bar"><div id="timer-fill"></div></div>
                <div class="timer-text">Next round in: <span id="time-left">05:00</span></div>
            </div>

            <div class="actions">
                <button id="btn-up" class="trade-btn up">UP <span>x1.95</span></button>
                <button id="btn-down" class="trade-btn down">DOWN <span>x1.95</span></button>
            </div>
        </div>

        <div class="history">
            <h4>My Positions</h4>
            <div id="history-list">
                <p class="empty">No active trades</p>
            </div>
        </div>
    </div>
    <script src="app.js?v=99"></script>
</body>
</html>
